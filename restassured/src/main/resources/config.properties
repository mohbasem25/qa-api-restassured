# Base configuration for the API under test.
# Override any of these at runtime with -Dkey=value, e.g.:
#   mvn test -Dbase.uri=https://reqres.in -Dapi.key=reqres-free-v1

base.uri=https://reqres.in
base.path=/api
api.key.header=x-api-key
api.key.value=reqres-free-v1

connection.timeout.ms=10000
socket.timeout.ms=10000

# Response time SLA (milliseconds) used in assertions across the suite.
response.time.sla.ms=3000
